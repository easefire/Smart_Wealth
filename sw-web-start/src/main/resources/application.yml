server:
  port: 8099

spring:
  application:
    name: smart-wealth_db
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smart_wealth_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 923827
    hikari:
      maximum-pool-size: 25
      minimum-idle: 10
      connection-timeout: 30000
  data:
    redis:
      host: localhost
      port: 6379
      password: 923827
      database: 0
      lettuce:
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 10
          max-wait: 5000ms
    rabbitmq:
      host: 127.0.0.1
      port: 5672
      username: guest
      password: guest

      publisher-confirm-type: correlated
      publisher-returns: true

      # ================= 护甲 2：消费端防线 (Consumer) =================
      listener:
        simple:
          # 【极其关键】金融系统必须开启手动 ACK，绝不能让 Spring 替你自动确认
          acknowledge-mode: manual
          # 消费者线程池大小，起到流量削峰作用
          concurrency: 5
          max-concurrency: 15
          # 拒绝消息后是否重新塞回原队列？绝对选 false，让它去死信队列
          default-requeue-rejected: false
          retry:
            # 开启本地内存重试拦截器
            enabled: true
            # 重试 3 次（含第一次执行）
            max-attempts: 3
            # 退避算法：2秒 -> 4秒 -> 8秒
            initial-interval: 2000ms
            multiplier: 2.0
            max-interval: 10000ms

# MyBatis Plus 配置
# 【REFACTOR-Step2-1】Mapper XML 已迁回各业务模块的 src/main/resources/mapper/，
# 主配置无需调整（classpath*: 已支持多 jar 扫描），但为了将来"按模块单独打 jar"也兼容子目录，
# 这里同时显式列出根目录与子目录两种通配，避免有人把 xml 放进 mapper/asset/ 类子目录而忘了改 yml。
mybatis-plus:
  mapper-locations:
    - classpath*:mapper/*.xml
    - classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true # 开启下划线转驼峰
  type-enums-package: com.smartwealth.user.enums

# Knife4j (Swagger) 配置
knife4j:
  enable: true
  setting:
    language: zh-CN

xxl:
  job:
    admin:
      # 刚才启动的调度中心地址
      addresses: http://127.0.0.1:8098/xxl-job-admin
    accessToken: default_token
    executor:
      # 执行器名称，去后台配置里要填这个
      appname: smart-wealth-executor
      # 自动获取IP，本地开发一般不用动
      address:
      ip:
      port: 8999
      logpath: ./logs/jobhandler
      logretentiondays: 30
# application.yml
smartwealth:
  ai:
    python-url: localhost:8888  # Python 服务的 URL 地址
  security:
    # 优先从环境变量读取
    allowed-ips: 127.0.0.1,192.168.1.100 # Python 服务的 IP 白名单
    # 【安全】JWT 与 AES 密钥严禁硬编码在代码里，必须通过环境变量覆盖。
    # 占位语法：${ENV_VAR:default}，生产部署时通过环境变量注入。
    jwt-secret: ${SMARTWEALTH_JWT_SECRET:CHANGE_ME_SmartWealth_Jwt_Secret_2026_For_Dev_Only}
    jwt-expire-ms: ${SMARTWEALTH_JWT_EXPIRE_MS:604800000}    # 默认 7 天
    aes-key: ${SMARTWEALTH_AES_KEY:CHANGE_ME_16Byts}         # 必须是 16/24/32 字节
